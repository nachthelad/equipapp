<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" type="text/css" href="style.css">
  <link rel="icon" type="image/png" href="resources\icon-512x512.png">
  <title>Equipapp</title>
</head>

<body>
  <!-- Container para agregar al jugador -->
  <div id="container1">
    <h2>Agregar Jugador</h2>
    <input type="text" id="nombreJugador" placeholder="Nombre del Jugador">
    <br><br>
    <label for="posicionJugador">Posición:</label>
    <select id="posicionJugador">
      <option value="" disabled selected>Seleccione una opción</option>
      <option value="Arquero">Arquero</option>
      <option value="Defensor">Defensor</option>
      <option value="Mediocampista">Mediocampista</option>
      <option value="Delantero">Delantero</option>
      <option value="Varios">Varios</option>
    </select>
    <br><br>
    <label for="categoriaJugador">Categoría:</label>
    <select id="categoriaJugador">
      <option value="" disabled selected>Seleccione una opción</option>
      <option value="A">A</option>
      <option value="B">B</option>
      <option value="C">C</option>
    </select>
    <br><br>
    <button id="guardarJugador">Guardar Jugador</button>
    <button id="vaciarCampos">Vaciar Campos</button>
    <h2>
    <button id="sortearEquipos" onclick="sortearEquipos()">Sortear Equipos</button>
  </h2>
  </div>
  <div id="container2">
    <h2>Lista de Jugadores <button id="minimizeBtn">-</button></h2>
    <ul id="listaJugadores"></ul>
  </div>

<script>

const minimizeBtn = document.getElementById("minimizeBtn");
  const listaJugadores = document.getElementById("listaJugadores");

  minimizeBtn.addEventListener("click", function () {
    if (listaJugadores.style.display === "none") {
      listaJugadores.style.display = "block";
      minimizeBtn.innerHTML = "-";
    } else {
      listaJugadores.style.display = "none";
      minimizeBtn.innerHTML = "+";
    }
  });

   // Variables para los inputs
const nombreJugador = document.getElementById("nombreJugador");
const posicionJugador =document.getElementById("posicionJugador");
const categoriaJugador = document.getElementById("categoriaJugador");

// Función para guardar el jugador
const jugadores = [];

const guardarJugador = () => {
// Obtenemos los valores del nombre, posición y categoría del jugador
const nombreJugador = document.getElementById("nombreJugador").value;
const posicionJugador = document.getElementById("posicionJugador").value;
const categoriaJugador = document.getElementById("categoriaJugador").value;

// Verificamos que los campos estén completos
  if (!nombreJugador || !posicionJugador || !categoriaJugador) {
    return alert("Por favor complete todos los campos");
  }
  
// Juntamos los valores en una sola string, separando cada uno con un espacio
  const jugador = `${nombreJugador} - ${posicionJugador} - Cat. ${categoriaJugador}`;

  jugadores.push(jugador);

  localStorage.setItem("jugadores", JSON.stringify(jugadores));
  mostrarJugadores();
};

const mostrarJugadores = () => {
  const listaJugadores = document.getElementById("listaJugadores");
  listaJugadores.innerHTML = "";
  for (const jugador of jugadores) {
    const li = document.createElement("li");
    li.innerHTML = jugador;
    const btnEliminar = document.createElement("button");
    btnEliminar.innerHTML = "X";
    btnEliminar.classList.add("btn-eliminar");
    btnEliminar.addEventListener("click", function () {
      const nombre = this.parentElement.textContent.split(" - ")[0];
      for (let i = 0; i < jugadores.length; i++) {
        if (jugadores[i].startsWith(nombre)) {
          jugadores.splice(i, 1);
          break;
        }
      }
      localStorage.setItem("jugadores", JSON.stringify(jugadores));
      mostrarJugadores();
    });
    li.appendChild(btnEliminar);
    listaJugadores.appendChild(li);
  }
};

// Botón para guardar jugador
const btnGuardarJugador = document.getElementById("guardarJugador");
btnGuardarJugador.addEventListener("click", guardarJugador);

// Cargar jugadores guardados en local storage
const jugadoresGuardados = JSON.parse(localStorage.getItem("jugadores"));
if (jugadoresGuardados) {jugadores.push(...jugadoresGuardados);
}

// Event listener para guardar jugador
document.getElementById("guardarJugador").addEventListener("click", guardarJugador);

// Mostrar jugadores guardados en local storage
mostrarJugadores();

// Botón para vaciar campos
const btnVaciarCampos = document.getElementById("vaciarCampos");
btnVaciarCampos.addEventListener("click", function () {
nombreJugador.value = "";
posicionJugador.selectedIndex = 0;
categoriaJugador.selectedIndex = 0;
});

// Función para vaciar campos
const vaciarCampos = () => {
nombreJugador.value = "";
posicionJugador.value = "";
categoriaJugador.value = "";
};

// Event listener para vaciar campos
document.getElementById("vaciarCampos").addEventListener("click", vaciarCampos);

// Sortear equipos


const sortearEquipos = () => {
  if (jugadores.length < 16 || jugadores.length > 22) {
    return alert("Debe agregar entre 16 y 22 jugadores");
  }

  let equipo1 = [];
  let equipo2 = [];

  // Asignamos un arquero a cada equipo
  for (let i = 0; i < jugadores.length; i++) {
    const jugador = jugadores[i];
    if (jugador.endsWith("Arquero")) {
      if (equipo1.length === 0) {
        equipo1.push(jugadores[i].split(" - ").slice(0, 2).join(" : "));
      } else {
        equipo2.push(jugadores[i].split(" - ").slice(0, 2).join(" : "));
      }
    }
  }
  // Asignamos jugadores a cada equipo
  let jugadoresRestantes = jugadores.filter((jugador) => !jugador.endsWith("Arquero"));

// Si hay 4 o más jugadores en la lista con id=categoriaJugador y value=A
if (jugadoresRestantes.length >= 4) {
  // Mezclamos el array de jugadores
  for (let i = jugadoresRestantes.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [jugadoresRestantes[i], jugadoresRestantes[j]] = [      jugadoresRestantes[j],
      jugadoresRestantes[i],
    ];
  }
}

// Clasificamos a los jugadores por su posición
const arqueros = [];
const defensores = [];
const mediocampistas = [];
const delanteros = [];
const varios = [];

for (let i = 0; i < jugadoresRestantes.length; i++) {
  const posicion = jugadoresRestantes[i].split(" - ")[1];
  switch (posicion) {
    case "Arquero":
      arqueros.push(jugadoresRestantes[i]);
      break;
    case "Defensor":
      defensores.push(jugadoresRestantes[i]);
      break;
    case "Mediocampista":
      mediocampistas.push(jugadoresRestantes[i]);
      break;
    case "Delantero":
      delanteros.push(jugadoresRestantes[i]);
      break;
    case "Varios":
      varios.push(jugadoresRestantes[i]);
      break;
    default:
      break;
  }
}

// Repartimos los jugadores en partes iguales
for (const posicion of [arqueros, defensores, mediocampistas, delanteros, varios]) {
  for (let i = 0; i < posicion.length; i++) {
if (i % 2 === 0) {
equipo1.push(
posicion[i].split(" - ").slice(0, 2).join(" : ")
);
} else {
equipo2.push(
posicion[i].split(" - ").slice(0, 2).join(" : ")
);
}
}
}

// Redirigir a la página de equipos y mostrar los equipos sorteados
localStorage.setItem("equipo1", JSON.stringify(equipo1));
localStorage.setItem("equipo2", JSON.stringify(equipo2));
window.location.href = "equipos.html";


};


</script>
